    Experience:
      - company: University of Maryland
        position: Co-Director, Social Data Science Major
        start_date: 2021-10
        end_date: present
        location: College Park, MD
        highlights:
          - Led the development of a new major in Social Data Science (officially launched Fall 2022), including working across departments to build an appropriate curriculum, managing the budget, and setting up infrastructure.
          - "Developed new courses to be part of Social Data Science, including SDSB233: Data Science for Social Sciences and SDSB326: Python Programming for Social Science."
          - "Launched a new undergraduate Data Curation Fellowship experience in
            which students identify, obtain, clean, and curate datasets to be
            used within social science courses, with a public-facing data
            resource webpage (https://bsos-data.umd.edu)."
          - "Coordinated across colleges with the College of Information
            Co-Director to set up advising, teaching workload, and major
            requirements for students."
      - company: "University of Maryland"
        position: Director of Graduate Studies, Joint Program in Survey Methodology
        start_date: "2024-09"
        end_date: "present"
        location: "College Park, MD"
        highlights:
          - "Oversaw updates to the Master’s in Survey and Data Science program,
            including adding SURV613: Machine Learning for Social Science as a
            required course and incorporating neural networks and LLMs into
            course material."
          - "Assisted graduate students in finding funding through grants or
            teaching assistant opportunities on campus."
          - "Chaired the Master’s Admissions committee and coordinated with the
            Director of JPSM on recruitment efforts."
      - company: "Joint Program in Survey Methodology, University of Maryland"
        position: "Associate Research Professor"
        start_date: "2024-07"
        end_date: "present"
        location: "College Park, MD"
        highlights:
          - "Developed and implemented innovative teaching assignments and tools
            including: cloud-based programming workbooks using JupyterHub
            (multiple classes); a board game decision analysis project for an
            undergraduate class (INST 354: Decision Making for Information
            Science); a data disclosure-proofing project (SURV 622: Fundamentals
            of Data Collection); and a custom R package containing tutorials
            (SURV 613: Machine Learning for Social Science)."
          - "Taught classes on introductory statistics, data science, machine learning, and programming for both undergraduate and graduate students, utilizing traditional and flipped classroom formats in online, in-person, and HyFlex modes."
          - "As part of an NSF grant, managed and oversaw the development and day-to-day operations of data analytics training courses for working professionals and graduate students at the National Center for Science and Engineering Statistics (NCSES) at the National Science Foundation (NSF)."
      - company: "Joint Program in Survey Methodology, University of Maryland"
