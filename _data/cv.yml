        highlights:
          - "Provided guidance as a facilitator with the Applied Data Analytics
            program for teaching record linkage, text analysis, network
            analysis, and machine learning to working professionals in public
            policy."
          - "Consulted on a research projects using machine learning for
            imputation with large scale transaction-level purchasing data."
          - "Developed modularized lessons and notebooks for introductory
            statistics and programming in Python, R and SQL."
      - company: "UCLA Institute for Digital Research and Education"
