      - label: "Statistical Software"
        details: "Highly skilled in R, SQL and Python, including various packages such
          as Rcpp, caret, tidyverse, tidymodels, and more (in R); and pandas,
          scikit-learn, nltk, tensorflow, and more (in Python)."
